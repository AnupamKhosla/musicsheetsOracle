<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site Updating — musicsheets</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
      .spinner { width: 48px; height: 48px; border: 4px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 24px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 1.5rem; margin-bottom: 8px; }
      p { color: #94a3b8; margin-bottom: 32px; }
      #log { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; max-width: 700px; width: 100%; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8125rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; min-height: 100px; max-height: 60vh; overflow-y: auto; }
      .dot { animation: pulse 1.5s infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <h1>Deployment in progress</h1>
    <p>Site will be back in ~60 seconds<span class="dot">...</span></p>
    <pre id="log">Waiting for pipeline logs...</pre>
    <script>
      const logEl = document.getElementById('log');
      let retries = 0;
      const MAX_RETRIES = 40; // ~2 minutes at 3s intervals

      async function fetchLogs() {
        try {
          const resp = await fetch('/logs.html?' + Date.now(), { cache: 'no-store' });
          if (resp.ok) {
            const text = await resp.text();
            logEl.textContent = text || 'Pipeline running...';
            retries = 0;
          }
        } catch(e) {
          retries++;
          if (retries > MAX_RETRIES) {
            logEl.textContent = 'Logs unavailable. If this persists, SSH into server.';
          }
        }
      }

      async function checkAlive() {
        try {
          const resp = await fetch('/api/health', { cache: 'no-store' });
          if (resp.ok && resp.status === 200) {
            window.location.reload();
          }
        } catch(e) {}
      }

      fetchLogs();
      setInterval(fetchLogs, 3000);
      setInterval(checkAlive, 5000);
    </script>
  </body>
</html>
