<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pipeline — musicsheets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: ui-monospace, 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #0a0a0f;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 32px 20px;
    }
    .header {
      max-width: 800px;
      margin: 0 auto 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #21262d;
    }
    .header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 4px;
    }
    .header .meta {
      font-size: 0.75rem;
      color: #8b949e;
    }
    .header .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
    }
    .header .status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

    .log-container {
      max-width: 800px;
      margin: 0 auto;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      font-size: 0.7rem;
      color: #8b949e;
    }
    #log {
      padding: 14px;
      font-size: 0.75rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 300px;
      max-height: 65vh;
      overflow-y: auto;
      color: #8b949e;
    }
    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: #0d1117; }
    #log::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }

    .log-line { padding: 1px 0; }
    .log-line.ts    { color: #58a6ff; }
    .log-line.info  { color: #8b949e; }
    .log-line.warn  { color: #d29922; }
    .log-line.error { color: #f85149; }
    .log-line.ok    { color: #3fb950; }

    .footer {
      max-width: 800px;
      margin: 16px auto 0;
      font-size: 0.7rem;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>musicsheets pipeline</h1>
    <div class="meta">
      <span id="ist"></span>
      &nbsp;|&nbsp;
      <span class="status"><span class="dot"></span> deploying</span>
    </div>
  </div>

  <div class="log-container">
    <div class="log-header">
      <span>stdout</span>
      <span id="last-update"></span>
    </div>
    <pre id="log">Waiting for pipeline...</pre>
  </div>

  <div class="footer">
    Site auto-reloads when deployment finishes. Do not close this page.
  </div>

  <script>
    const logEl = document.getElementById('log');
    const istEl = document.getElementById('ist');
    const lastUpdateEl = document.getElementById('last-update');
    let retries = 0;
    const MAX_RETRIES = 60;

    function formatIST(d) {
      return d.toLocaleString('en-IN', {
        timeZone: 'Asia/Kolkata',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function updateTime() {
      istEl.textContent = 'IST ' + formatIST(new Date());
    }
    updateTime();
    setInterval(updateTime, 1000);

    function colorize(text) {
      return text.split('\n').map(line => {
        let cls = 'info';
        if (line.match(/\[.*\]/)) cls = 'ts';
        if (line.match(/FAILED|FATAL|ERROR/i)) cls = 'error';
        if (line.match(/WARN/i)) cls = 'warn';
        if (line.match(/SUCCESS|complete|live|Build successful/i)) cls = 'ok';
        return '<span class="log-line ' + cls + '">' + line + '</span>';
      }).join('\n');
    }

    async function fetchLogs() {
      try {
        const resp = await fetch('/logs.html?' + Date.now(), { cache: 'no-store' });
        if (resp.ok) {
          const text = await resp.text();
          logEl.innerHTML = colorize(text) || '<span class="log-line info">Pipeline running...</span>';
          lastUpdateEl.textContent = formatIST(new Date());
          retries = 0;
        }
      } catch(e) {
        retries++;
        if (retries > MAX_RETRIES) {
          logEl.innerHTML = '<span class="log-line error">Logs unavailable. SSH into VPS.</span>';
        }
      }
    }

    async function checkAlive() {
      try {
        const resp = await fetch('/api/health', { cache: 'no-store' });
        if (resp.ok && resp.status === 200) {
          const data = await resp.json();
          if (!data.maintenance) {
            window.location.reload();
          }
        }
      } catch(e) {}
    }

    fetchLogs();
    setInterval(fetchLogs, 2000);
    setInterval(checkAlive, 4000);
  </script>
</body>
</html>
